# Neuromancer-specific hyprlock overrides (sourced after ALL/hyprlock.conf).
# Fingerprint unlock via the Goodix MOC reader. hyprlock drives fprintd directly
# over D-Bus (not pam_fprintd), running alongside the PAM password backend, so
# the lock screen accepts either a typed password or a finger tap.
auth {
    fingerprint {
        enabled = true
        ready_message = Scan fingerprint to unlock
        present_message = Scanning...
        retry_delay = 250
    }
}
