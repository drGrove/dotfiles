# Neuromancer-specific Hyprland config (sourced after ALL/hyprland.conf).
# Framework Laptop 16 (AMD Ryzen, single Radeon iGPU = card1). Internal 2560x1600
# panel + up to two 1080p externals over the USB-C/DisplayPort dock.

# No GPU pin needed: this host has a single AMD DRM node (card1). Unlike tardis
# there is no second GPU for Aquamarine to trip over.

# Monitors. DRM connector names from /sys/class/drm/card1-* (connected outputs):
#   eDP-1  -> internal panel  (was the X11 "primary")
#   DP-3   -> external #1      \ the two dock-attached 1080p displays. X11 saw
#   DP-4   -> external #2      / these as DisplayPort-2 / DisplayPort-3.
# Scale 1.6 on eDP-1 mirrors the X11 DEVICE_SCALE_FACTOR=1.5 from setdpi and
# yields a clean 1600x1000 logical size (2560/1.6, 1600/1.6). Externals are 1:1.
# VERIFY left/right order with `hyprctl monitors` on first boot; if the externals
# come up swapped, exchange the DP-3 / DP-4 positions below.
monitor = eDP-1, 2560x1600, 0x0, 1.6
monitor = DP-3, 1920x1080, 1600x0, 1
monitor = DP-4, 1920x1080, 3520x0, 1
# Catch-all so any other dock port that lights up is placed automatically rather
# than stacked at 0x0 on top of the laptop panel.
monitor = , preferred, auto, 1

# Pin workspaces 1-10 to the internal panel so they are always present when
# undocked (matches the X11 layout where ws1-10 were assigned to primary=eDP).
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1

# Optional clamshell handling: when docked with the lid shut, turn the internal
# panel off; turn it back on when reopened. Uncomment to enable.
# bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
# bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, 2560x1600, 0x0, 1.6"
