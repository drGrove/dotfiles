# Shared Hyprland config (all hosts). Sourced from ~/.config/hypr/hyprland.conf.
# Host-specific monitor= and env overrides live in ~/.host_config/current/hyprland.conf.

#### Environment ####
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = _JAVA_AWT_WM_NONREPARENTING,1
env = SDL_VIDEODRIVER,wayland

#### Input ####
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    repeat_rate = 50
    repeat_delay = 300
}

#### Look ####
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 2
    col.active_border = rgba(8b0000ff)
    col.inactive_border = rgba(000000ff)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

#### Keybinds (Mod=Super) ####
$mod = SUPER

# Apps
bind = $mod, Return, exec, kitty
bind = $mod SHIFT, w, killactive,
bind = $mod, Tab, exec, fuzzel
bind = $mod, d, exec, fuzzel
bind = $mod CTRL, m, exec, pavucontrol
bind = $mod, p, exec, tessen -d fuzzel -a autotype
bind = $mod SHIFT, p, exec, tessen -d fuzzel -a copy

# Focus (i3 cardinal layout: j=left, k=down, l=up, ;=right)
bind = $mod, j, movefocus, l
bind = $mod, k, movefocus, d
bind = $mod, l, movefocus, u
bind = $mod, semicolon, movefocus, r

# Move window
bind = $mod SHIFT, j, movewindow, l
bind = $mod SHIFT, k, movewindow, d
bind = $mod SHIFT, l, movewindow, u
bind = $mod SHIFT, semicolon, movewindow, r
bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Right, movewindow, r

# Workspace cycle
bind = $mod, Left, workspace, e-1
bind = $mod, Right, workspace, e+1

# Layout. Dwindle splits direction automatically from aspect ratio; h flips it.
bind = $mod, h, layoutmsg, togglesplit
bind = $mod, f, fullscreen,
bind = $mod, e, pseudo,
bind = $mod SHIFT, space, togglefloating,
bind = $mod, space, cyclenext,

# Session
bind = $mod SHIFT, Escape, exec, loginctl lock-session
bind = $mod SHIFT, c, exec, hyprctl reload
bind = $mod SHIFT, q, exit,

# Resize submap
bind = $mod, r, submap, resize
submap = resize
binde = , j, resizeactive, -20 0
binde = , k, resizeactive, 0 20
binde = , l, resizeactive, 0 -20
binde = , semicolon, resizeactive, 20 0
binde = , Left, resizeactive, -20 0
binde = , Down, resizeactive, 0 20
binde = , Up, resizeactive, 0 -20
binde = , Right, resizeactive, 20 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
bind = $mod, r, submap, reset
submap = reset

# Mouse drag
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow


# Volume signal (matches i3blocks volume script + waybar custom/volume signal=10)
bind = , XF86AudioRaiseVolume, exec, amixer -q sset Master 5%+ && pkill -RTMIN+10 waybar
bind = , XF86AudioLowerVolume, exec, amixer -q sset Master 5%- && pkill -RTMIN+10 waybar
bind = , XF86AudioMute, exec, amixer -q sset Master toggle && pkill -RTMIN+10 waybar

#### Workspaces 1-40 ####
