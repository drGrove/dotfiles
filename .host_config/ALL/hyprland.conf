bind = $mod SHIFT CTRL, 2, movetoworkspace, 12
bind = $mod SHIFT CTRL, 3, movetoworkspace, 13
bind = $mod SHIFT CTRL, 4, movetoworkspace, 14
bind = $mod SHIFT CTRL, 5, movetoworkspace, 15
bind = $mod SHIFT CTRL, 6, movetoworkspace, 16
bind = $mod SHIFT CTRL, 7, movetoworkspace, 17
bind = $mod SHIFT CTRL, 8, movetoworkspace, 18
bind = $mod SHIFT CTRL, 9, movetoworkspace, 19
bind = $mod SHIFT CTRL, 0, movetoworkspace, 20

# 21-30: Super + CTRL + QWERTY top row
bind = $mod CTRL, q, workspace, 21
bind = $mod CTRL, w, workspace, 22
bind = $mod CTRL, e, workspace, 23
bind = $mod CTRL, r, workspace, 24
bind = $mod CTRL, t, workspace, 25
bind = $mod CTRL, y, workspace, 26
bind = $mod CTRL, u, workspace, 27
bind = $mod CTRL, i, workspace, 28
bind = $mod CTRL, o, workspace, 29
bind = $mod CTRL, p, workspace, 30
bind = $mod SHIFT CTRL, q, movetoworkspace, 21
bind = $mod SHIFT CTRL, w, movetoworkspace, 22
bind = $mod SHIFT CTRL, e, movetoworkspace, 23
bind = $mod SHIFT CTRL, r, movetoworkspace, 24
bind = $mod SHIFT CTRL, t, movetoworkspace, 25
bind = $mod SHIFT CTRL, y, movetoworkspace, 26
bind = $mod SHIFT CTRL, u, movetoworkspace, 27
bind = $mod SHIFT CTRL, i, movetoworkspace, 28
bind = $mod SHIFT CTRL, o, movetoworkspace, 29
bind = $mod SHIFT CTRL, p, movetoworkspace, 30

# 31-40: Super + CTRL + a/s/d/f/g/h/j/k/l/z
bind = $mod CTRL, a, workspace, 31
bind = $mod CTRL, s, workspace, 32
bind = $mod CTRL, d, workspace, 33
bind = $mod CTRL, f, workspace, 34
