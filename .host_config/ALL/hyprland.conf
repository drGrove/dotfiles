#### Window rules ####
# Hyprland 0.55 windowrule v3 syntax: each comma-separated item is
# `name value` (space between). Match properties are prefixed with `match:`.
# Effect names use underscores (stay_focused, focus_on_activate).

# Float
windowrule = float true, match:class ^([Pp]avucontrol)$
windowrule = float true, match:class ^([Pp]inentry).*$
windowrule = float true, match:class ^([Yy]ubico).*$
windowrule = float true, match:title ^(?i)Authentication Required.*$
windowrule = float true, match:title ^Write: .* - Thunderbird$
windowrule = float true, match:title ^(?i)Android Emulator.*$
windowrule = float true, match:title ^(?i)Save Image$

# Workspace assign (Thunderbird -> ws28)
windowrule = workspace 28, match:class ^(TB|Thunderbird)$

# Stay focused (jetbrains studio emulator subwindow)
windowrule = stay_focused true, match:class ^jetbrains-studio$, match:title ^win\d+$

# Opacity (from picom rules with <100 values)
windowrule = opacity 0.9, match:class ^(kitty)$
windowrule = opacity 0.9, match:title .*Page Info.*
windowrule = opacity 0.9, match:title .*Panel.*
windowrule = opacity 0.9, match:title .*Restart.*

#### Autostart ####
# Services are enabled via `systemctl --user enable` and pulled in by
# graphical-session.target (activated by uwsm). uwsm finalize propagates env
# into the user manager + dbus so the units see WAYLAND_DISPLAY.
exec-once = uwsm finalize WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
