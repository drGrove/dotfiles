bind = $mod CTRL, h, workspace, 36
bind = $mod CTRL, j, workspace, 37
bind = $mod CTRL, k, workspace, 38
bind = $mod CTRL, l, workspace, 39
bind = $mod CTRL, z, workspace, 40
bind = $mod SHIFT CTRL, a, movetoworkspace, 31
bind = $mod SHIFT CTRL, s, movetoworkspace, 32
bind = $mod SHIFT CTRL, d, movetoworkspace, 33
bind = $mod SHIFT CTRL, f, movetoworkspace, 34
bind = $mod SHIFT CTRL, g, movetoworkspace, 35
bind = $mod SHIFT CTRL, h, movetoworkspace, 36
bind = $mod SHIFT CTRL, j, movetoworkspace, 37
bind = $mod SHIFT CTRL, k, movetoworkspace, 38
bind = $mod SHIFT CTRL, l, movetoworkspace, 39
