# Tardis-specific Hyprland config (sourced after ALL/hyprland.conf).
# 4 monitors at 1080p driven by AMD RX 470/480 (card0). NVIDIA RTX 3080 is idle.

# GPU pin: AMD card0 (0000:02:00.0). NVIDIA card1 has 0 connected outputs but
# Aquamarine still tries it first for the EGL renderer and fails on NVIDIA's
# non-wlroots-friendly EGL. Pin to card0. Aquamarine's AQ_DRM_DEVICES parser
# splits on `:`, so the /dev/dri/by-path symlink (PCI BDF has colons) can't
# be used; the numeric /dev/dri/cardN path is colon-free.
# VERIFY after kernel/driver updates: `readlink /sys/class/drm/card0/device`
# must still point to 0000:02:00.0 (AMD). If not, change to /dev/dri/card1.
env = AQ_DRM_DEVICES,/dev/dri/card0

# Monitors. DRM connector names from /sys/class/drm/card0-* (connected outputs).
# Position assignments mirror the X11 layout from 4-screen-radeon.sh. The xrandr
# names DisplayPort-3/4/5 + HDMI-A-1 are renumbered by X; the DRM names below
# are what Hyprland sees. Confirm physical placement with `hyprctl monitors` on
# first boot and adjust positions if monitors come up out of order.
monitor = DP-4, 1920x1080, 0x1080, 1
monitor = DP-6, 1920x1080, 1920x1080, 1
monitor = DP-5, 1920x1080, 3840x1080, 1
monitor = HDMI-A-2, 1920x1080, 3840x0, 1
monitor = DVI-D-1, disable

# Pin workspaces 1-10 to primary (DP-4, the bottom-left position).
workspace = 1, monitor:DP-4, default:true
workspace = 2, monitor:DP-4
workspace = 3, monitor:DP-4
workspace = 4, monitor:DP-4
workspace = 5, monitor:DP-4
workspace = 6, monitor:DP-4
workspace = 7, monitor:DP-4
workspace = 8, monitor:DP-4
workspace = 9, monitor:DP-4
workspace = 10, monitor:DP-4
