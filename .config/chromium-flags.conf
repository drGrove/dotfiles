# Read by the Arch `chromium` launcher. `ozone-platform-hint=auto` runs Chromium
# natively on Wayland under Hyprland (and falls back to X11 under i3), which is
# what lets Google Meet "Present" use the PipeWire/xdg-desktop-portal screen
# picker instead of a black frame. PipeWire WebRTC capture is enabled explicitly
# for older builds; it is the default on current Chromium.
--ozone-platform-hint=auto
--enable-features=WebRTCPipeWireCapturer
